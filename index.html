var selectedLevel1 = null;
var activeMenuId = null;

// =============================================
// 메뉴 선택

function selectLevel1(name, menuId) {
  if (activeMenuId) {
    document.getElementById(activeMenuId).classList.remove('active');
  }
  selectedLevel1 = name;
  activeMenuId = menuId;
  document.getElementById(menuId).classList.add('active');
  document.getElementById('allSearchBtn').classList.remove('active');

  var badge = document.getElementById('selectedBadge');
  document.getElementById('selectedBadgeText').textContent = '📁 ' + name;
  badge.classList.add('show');

  var tag = document.getElementById('menuTag');
  tag.textContent = '📁 ' + name;
  tag.classList.add('show');

  updateQuickBtns(name);
  addBotMessage('<b>📁 "' + name + '"</b> 메뉴가 선택되었습니다.<br>해당 메뉴 내에서 우선 검색하여 답변드릴게요! 😊<br><br>질문을 입력하거나 아래 빠른 질문 버튼을 눌러보세요.', null);
}

function clearMenu() {
  selectedLevel1 = null;
  if (activeMenuId) {
    document.getElementById(activeMenuId).classList.remove('active');
    activeMenuId = null;
  }
  document.getElementById('selectedBadge').classList.remove('show');
  document.getElementById('menuTag').classList.remove('show');
  document.getElementById('allSearchBtn').classList.add('active');
  resetQuickBtns();
  addBotMessage('메뉴 선택이 해제되었습니다. <b>전체 범위</b>에서 검색합니다. 🔍', null);
}

function updateQuickBtns(name) {
  var container = document.getElementById('quickBtns');
  var filtered = qaDB.filter(function(d){ return d.level1 === name; });
  container.innerHTML = filtered.slice(0, 5).map(function(d){
    return '<span class="quick-btn" onclick="quickAsk(\'' + d.questions[0].replace(/'/g, "\\'") + '\')">' + d.questions[0] + '</span>';
  }).join('');
}

// =============================================
// 검색 엔진
// =============================================
function searchAnswer(query) {
  var q = query.toLowerCase().replace(/\s/g, '');
  var pool = selectedLevel1 ? qaDB.filter(function(d){ return d.level1 === selectedLevel1; }) : qaDB;

  // 1단계: 정확 매칭
  for (var i = 0; i < pool.length; i++) {
    for (var j = 0; j < pool[i].questions.length; j++) {
      var nq = pool[i].questions[j].toLowerCase().replace(/\s/g, '');
      if (q.includes(nq) || nq.includes(q)) {
        return { type: 'exact', data: pool[i] };
      }
    }
  }

  // 2단계: 키워드 매칭
  var bestMatch = null, bestScore = 0;
  for (var i = 0; i < pool.length; i++) {
    var score = 0;
    for (var k = 0; k < pool[i].keywords.length; k++) {
      var nk = pool[i].keywords[k].toLowerCase().replace(/\s/g, '');
      if (q.includes(nk) || nk.includes(q)) score += 3;
    }
    for (var j = 0; j < pool[i].questions.length; j++) {
      var words = pool[i].questions[j].toLowerCase().split(/[\s;,]+/);
      for (var w = 0; w < words.length; w++) {
        if (words[w].length > 1 && q.includes(words[w])) score += 1;
      }
    }
    if (score > bestScore) { bestScore = score; bestMatch = pool[i]; }
  }
  if (bestScore >= 2) return { type: 'partial', data: bestMatch };

  // 3단계: 전체 재검색
  if (selectedLevel1) {
    for (var i = 0; i < qaDB.length; i++) {
      for (var k = 0; k < qaDB[i].keywords.length; k++) {
        if (q.includes(qaDB[i].keywords[k].toLowerCase().replace(/\s/g, ''))) {
          return { type: 'partial', data: qaDB[i] };
        }
      }
    }
  }

  return { type: 'none', data: null };
}

function getTime() {
  return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
}

function addUserMessage(text) {
  var msgs = document.getElementById('messages');
  msgs.innerHTML += '<div class="message user"><span class="timestamp">' + getTime() + '</span><div class="bubble">' + text + '</div><div class="avatar">👤</div></div>';
  msgs.scrollTop = msgs.scrollHeight;
}


function addBotMessage(html, source) {
  var msgs = document.getElementById('messages');
  var sourceHtml = source ? '<div class="source-tag">📌 출처: ' + source + '</div>' : '';
  msgs.innerHTML += '<div class="message bot"><div class="avatar">🤖</div><div><div class="bubble">' + html + sourceHtml + '</div><span class="timestamp">' + getTime() + '</span></div></div>';
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  var msgs = document.getElementById('messages');
  msgs.innerHTML += '<div class="message bot" id="typingIndicator"><div class="avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>';
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  var t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

// =============================================
// 메시지 전송
// =============================================
function sendMessage() {
  var input = document.getElementById('userInput');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = '48px';
  addUserMessage(text);
  showTyping();
  setTimeout(function() {
    removeTyping();
    var result = searchAnswer(text);
    if (result.type === 'exact') {
      addBotMessage(result.data.answer, result.data.source);
    } else if (result.type === 'partial') {
      addBotMessage('🔍 관련 내용을 찾았습니다. 아래 내용이 맞나요?<br><br>' + result.data.answer + '<br><br>💬 더 구체적으로 질문해 주시면 정확한 답변을 드릴게요!', result.data.source);
    } else {
      addBotMessage('질문에 적합한 검색결과가 없어서 답변을 드릴 수 없습니다.<br><br>💡 다른 키워드로 다시 질문하거나, 왼쪽 메뉴에서 카테고리를 선택해 주세요.', null);
    }
  }, 700);
}

function quickAsk(q) {
  document.getElementById('userInput').value = q;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = '48px';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
