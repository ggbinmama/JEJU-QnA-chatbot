// =============================================
// 상태 관리
// =============================================
var selectedCat = 'all';
var selectedLevel1 = null;
var activeCatId = 'cat-all';
var activeTabId = 'tab-all-sub';

// =============================================
// 업무구분(카테고리) 선택
// =============================================
function selectCategory(cat, catId) {
  document.querySelectorAll('.category-tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById(catId).classList.add('active');
  activeCatId = catId;
  selectedCat = cat;
  selectedLevel1 = null;

  // LEVEL1 탭 렌더링
  renderMenuTabs(cat);

  var bar = document.getElementById('selectedMenuBar');
  bar.classList.remove('show');

  if(cat === 'all') {
    updateQuickBtns('all');
    addBotMessage('전체 범위에서 검색합니다. 🔍<br>질문을 입력하거나 아래 버튼을 눌러보세요!', null);
  } else {
    updateQuickBtns(cat);
    addBotMessage('<b>' + (cat==='이동전화'?'📱':'🌐') + ' "' + cat + '"</b> 업무 범위가 선택되었습니다.<br>하위 메뉴를 선택하거나 바로 질문해 주세요! 😊', null);
  }
}

function renderMenuTabs(cat) {
  var tabs = menuStructure[cat] ? menuStructure[cat].tabs : menuStructure['all'].tabs;
  var html = '';
  tabs.forEach(function(t, i) {
    var active = i===0 ? ' active' : '';
    html += '<div class="menu-tab'+active+'" id="'+t.id+'" onclick="selectMenu(\''+t.level1+'\',\''+t.id+'\')">' + t.label + '</div>';
  });
  document.getElementById('menuTabs').innerHTML = html;
  if(tabs.length > 0) {
    activeTabId = tabs[0].id;
  }
}

// =============================================
// LEVEL1 메뉴 선택
// =============================================
function selectMenu(level1, tabId) {
  document.querySelectorAll('.menu-tab').forEach(function(t){ t.classList.remove('active'); });
  var el = document.getElementById(tabId);
  if(el) el.classList.add('active');
  activeTabId = tabId;

  var bar = document.getElementById('selectedMenuBar');

  if(level1 === 'all' || level1 === 'all_mobile' || level1 === 'all_wire') {
    selectedLevel1 = null;
    bar.classList.remove('show');
    var catLabel = selectedCat === 'all' ? '전체' : selectedCat;
    updateQuickBtns(selectedCat === 'all' ? 'all' : selectedCat);
    addBotMessage('<b>' + catLabel + '</b> 전체 범위에서 검색합니다. 🔍<br>질문을 입력하거나 아래 버튼을 눌러보세요!', null);
  } else {
    selectedLevel1 = level1;
    document.getElementById('selectedMenuText').textContent = '📁 ' + level1 + ' 범위에서 검색 중';
    bar.classList.add('show');
    updateQuickBtns(level1);
    addBotMessage('<b>📁 "' + level1 + '"</b> 메뉴가 선택되었습니다.<br>해당 메뉴 내에서 우선 검색하여 답변드릴게요! 😊', null);
  }
}

function resetToAll() {
  selectCategory('all', 'cat-all');
}

function updateQuickBtns(key) {
  var btns = quickBtnMap[key] || quickBtnMap['all'];
  var html = btns.map(function(b){
    return '<span class="quick-btn" onclick="quickAsk(\'' + b.q.replace(/'/g,"\\'") + '\')">' + b.label + '</span>';
  }).join('');
  document.getElementById('quickBtns').innerHTML = html;
}

// =============================================
// 검색 엔진
// =============================================
function _s(v){return v.toLowerCase().replace(/\s/g,'');}

function searchAnswer(query) {
  var q = _s(query);

  // 검색 풀 결정
  var pool;
  if(selectedLevel1) {
    pool = qaDB.filter(function(d){ return d.level1 === selectedLevel1; });
  } else if(selectedCat && selectedCat !== 'all') {
    pool = qaDB.filter(function(d){ return d.cat === selectedCat; });
  } else {
    pool = qaDB;
  }

  // 1단계: 정확 매칭
  for(var i=0;i<pool.length;i++){
    for(var j=0;j<pool[i].questions.length;j++){
      var nq=_s(pool[i].questions[j]);
      if(q.includes(nq)||nq.includes(q)) return {type:'exact',data:pool[i]};
    }
  }

  // 2단계: 키워드 매칭
  var bestMatch=null,bestScore=0;
  for(var i=0;i<pool.length;i++){
    var score=0;
    for(var k=0;k<pool[i].keywords.length;k++){
      var nk=_s(pool[i].keywords[k]);
      if(q.includes(nk)||nk.includes(q)) score+=3;
    }
    for(var j=0;j<pool[i].questions.length;j++){
      var words=pool[i].questions[j].toLowerCase().split(/[\s;,]+/);
      for(var w=0;w<words.length;w++){
        if(words[w].length>1&&q.includes(words[w])) score+=1;
      }
    }
    if(score>bestScore){bestScore=score;bestMatch=pool[i];}
  }
  if(bestScore>=2) return {type:'partial',data:bestMatch};

  // 3단계: 전체 재검색
  if(selectedLevel1||selectedCat!=='all'){
    for(var i=0;i<qaDB.length;i++){
      for(var k=0;k<qaDB[i].keywords.length;k++){
        if(q.includes(_s(qaDB[i].keywords[k]))) return {type:'partial',data:qaDB[i]};
      }
    }
  }
  return {type:'none',data:null};
}

// =============================================
// 메시지 출력
// =============================================
function _gt(){return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});}

function addUserMessage(text){
  var m=document.getElementById('messages');
  m.innerHTML+='<div class="message user"><span class="timestamp">'+_gt()+'</span><div class="bubble">'+text+'</div><div class="avatar">👤</div></div>';
  m.scrollTop=m.scrollHeight;
}

function addBotMessage(html,source){
  var m=document.getElementById('messages');
  var sh=source?'<div class="source-tag">📌 출처: '+source+'</div>':'';
  m.innerHTML+='<div class="message bot"><div class="avatar">🤖</div><div><div class="bubble">'+html+sh+'</div><span class="timestamp">'+_gt()+'</span></div></div>';
  m.scrollTop=m.scrollHeight;
}

function showTyping(){
  var m=document.getElementById('messages');
  m.innerHTML+='<div class="message bot" id="typingDot"><div class="avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>';
  m.scrollTop=m.scrollHeight;
}
function removeTyping(){var t=document.getElementById('typingDot');if(t)t.remove();}

// =============================================
// 메시지 전송
// =============================================
function sendMessage(){
  var input=document.getElementById('userInput');
  var text=input.value.trim();
  if(!text) return;
  input.value='';input.style.height='44px';
  addUserMessage(text);
  showTyping();
  setTimeout(function(){
    removeTyping();
    var result=searchAnswer(text);
    if(result.type==='exact'){
      addBotMessage(result.data.answer,result.data.source);
    } else if(result.type==='partial'){
      addBotMessage('🔍 관련 내용을 찾았습니다. 아래 내용이 맞나요?<br><br>'+result.data.answer+'<br><br>💬 더 구체적으로 질문해 주시면 정확한 답변을 드릴게요!',result.data.source);
    } else {
      addBotMessage('질문에 적합한 검색결과가 없어서 답변을 드릴 수 없습니다.<br><br>💡 다른 키워드로 다시 질문하거나, 상단 메뉴에서 카테고리를 선택해 주세요.',null);
    }
  },600);
}

function quickAsk(q){document.getElementById('userInput').value=q;sendMessage();}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='44px';el.style.height=Math.min(el.scrollHeight,100)+'px';}
