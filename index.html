function selectCategory(cat,catId){
  document.querySelectorAll('.category-tab').forEach(function(t){t.classList.remove('active');});

  activeCatId=catId;selectedCat=cat;selectedLevel1=null;

    addBotMessage('<b>'+(cat==='이동전화'?'📱':'🌐')+' "'+cat+'"</b> 업무 범위가 선택되었습니다.<br>하위 메뉴를 선택하거나 바로 질문해 주세요! 😊',null,null);
  }
}

function renderMenuTabs(cat){
  var tabs=menuStructure[cat]?menuStructure[cat].tabs:menuStructure['all'].tabs;
  var html='';
  tabs.forEach(function(t,i){
    var active=i===0?' active':'';
    html+='<div class="menu-tab'+active+'" id="'+t.id+'" onclick="selectMenu(\''+t.level1+'\',\''+t.id+'\')">'+t.label+'</div>';
  });
  document.getElementById('menuTabs').innerHTML=html;
  if(tabs.length>0) activeTabId=tabs[0].id;
}

function selectMenu(level1,tabId){
  document.querySelectorAll('.menu-tab').forEach(function(t){t.classList.remove('active');});
  var el=document.getElementById(tabId);
  if(el) el.classList.add('active');
  activeTabId=tabId;
  var bar=document.getElementById('selectedMenuBar');
  if(level1==='all'||level1==='all_mobile'||level1==='all_wire'){
    selectedLevel1=null;
    bar.classList.remove('show');
    var catLabel=selectedCat==='all'?'전체':selectedCat;
    updateQuickBtns(selectedCat==='all'?'all':selectedCat);
    addBotMessage('<b>'+catLabel+'</b> 전체 범위에서 검색합니다. 🔍<br>질문을 입력하거나 아래 버튼을 눌러보세요!',null,null);

    document.getElementById('selectedMenuText').textContent='📁 '+level1+' 범위에서 검색 중';

function searchAnswer(query){
  var q=_0x9f3c(query);
  var pool;
  if(selectedLevel1){
    pool=qaDB.filter(function(d){return d.level1===selectedLevel1;});
  } else if(selectedCat&&selectedCat!=='all'){
    pool=qaDB.filter(function(d){return d.cat===selectedCat;});
  } else {
    pool=qaDB;
  }
  for(var i=0;i<pool.length;i++){
    for(var j=0;j<pool[i].questions.length;j++){
      var nq=_0x9f3c(pool[i].questions[j]);
      if(q.includes(nq)||nq.includes(q)) return {type:'exact',data:pool[i]};
    }
  }
  var bestMatch=null,bestScore=0;
  for(var i=0;i<pool.length;i++){
    var score=0;
    for(var k=0;k<pool[i].keywords.length;k++){
      var nk=_0x9f3c(pool[i].keywords[k]);
      if(q.includes(nk)||nk.includes(q)) score+=3;
    }
    for(var j=0;j<pool[i].questions.length;j++){
      var words=pool[i].questions[j].toLowerCase().split(/[\s;,]+/);
      for(var w=0;w<words.length;w++){
        if(words[w].length>1&&q.includes(words[w])) score+=1;
      }
    }
    if(score>bestScore){bestScore=score;bestMatch=pool[i];}
  }
  if(bestScore>=2) return {type:'partial',data:bestMatch};
  if(selectedLevel1||selectedCat!=='all'){
    for(var i=0;i<qaDB.length;i++){
      for(var k=0;k<qaDB[i].keywords.length;k++){
        if(q.includes(_0x9f3c(qaDB[i].keywords[k]))) return {type:'partial',data:qaDB[i]};
      }
    }
  }
  return {type:'none',data:null};
}

  m.scrollTop=m.scrollHeight;
}
function removeTyping(){var t=document.getElementById('typingDot');if(t)t.remove();}

function sendMessage(){
  var input=document.getElementById('userInput');
  var text=input.value.trim();
  if(!text) return;
  input.value='';input.style.height='44px';
  addUserMessage(text);
  showTyping();
  setTimeout(function(){
    removeTyping();
    var result=searchAnswer(text);
    if(result.type==='exact'){
      addBotMessage(result.data.answer,result.data.source,result.data.seq);
    } else if(result.type==='partial'){
      addBotMessage('🔍 관련 내용을 찾았습니다. 아래 내용이 맞나요?<br><br>'+result.data.answer+'<br><br>💬 더 구체적으로 질문해 주시면 정확한 답변을 드릴게요!',result.data.source,result.data.seq);
    } else {
      addBotMessage('질문에 적합한 검색결과가 없어서 답변을 드릴 수 없습니다.<br><br>💡 다른 키워드로 다시 질문하거나, 상단 메뉴에서 카테고리를 선택해 주세요.',null,null);
    }
  },600);
}

function quickAsk(q){document.getElementById('userInput').value=q;sendMessage();}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='44px';el.style.height=Math.min(el.scrollHeight,100)+'px';}
