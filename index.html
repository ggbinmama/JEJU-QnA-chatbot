body{font-family:'Malgun Gothic',sans-serif;background:#f0f2f5;display:flex;height:100vh;overflow:hidden;}

/* 사이드바 */
.sidebar{width:270px;background:#1a1a2e;color:white;display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-header{padding:18px 16px;background:#e51c23;}

.sidebar-header .subtitle{font-size:11px;opacity:.9;margin-top:3px;}
.menu-title{padding:14px 16px 8px;font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;}
.menu-tree{padding:0 10px 10px;flex:1;overflow-y:auto;}
.category-group{margin-bottom:10px;}
.category-label{padding:8px 10px;font-size:11px;color:#aaa;display:flex;align-items:center;gap:6px;}
.category-label::after{content:'';flex:1;height:1px;background:#333;}
.level1-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:12.5px;font-weight:600;color:#ddd;border-radius:8px;margin-bottom:4px;transition:all .2s;background:#16213e;border:1px solid transparent;}
.level1-item:hover{background:#0f3460;color:white;border-color:#1a4a8a;}
.level1-item.active{background:#e51c23;color:white;border-color:#c62828;}
.level1-item .icon{font-size:15px;flex-shrink:0;}
.level1-item .label{flex:1;line-height:1.3;}
.level1-item .count{font-size:10px;background:rgba(255,255,255,.15);padding:2px 6px;border-radius:10px;white-space:nowrap;}
.level1-item.active .count{background:rgba(255,255,255,.25);}
.selected-badge{margin:6px 10px;padding:7px 12px;background:#0f3460;border-radius:8px;font-size:11px;color:#7eb8f7;display:none;align-items:center;gap:6px;border:1px solid #1a4a8a;}
.selected-badge.show{display:flex;}
.clear-btn{margin-left:auto;cursor:pointer;color:#aaa;font-size:14px;}
.clear-btn:hover{color:white;}
.all-search-btn{margin:6px 10px 4px;padding:9px 14px;background:transparent;border:1px dashed #444;border-radius:8px;color:#888;font-size:12px;cursor:pointer;text-align:center;transition:all .2s;}
.all-search-btn:hover{border-color:#e51c23;color:#e51c23;}
.all-search-btn.active{border-color:#e51c23;color:#e51c23;background:rgba(229,28,35,.08);}

/* 채팅 */
.chat-container{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-header{padding:13px 22px;background:white;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;gap:12px;box-shadow:0 2px 6px rgba(0,0,0,.06);}
.bot-avatar{width:40px;height:40px;background:#e51c23;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.bot-info .name{font-weight:700;font-size:15px;color:#1a1a2e;}
.bot-info .status{font-size:12px;color:#4caf50;display:flex;align-items:center;gap:4px;margin-top:2px;}
.status-dot{width:7px;height:7px;background:#4caf50;border-radius:50%;}
.menu-tag{margin-left:auto;padding:5px 14px;background:#fff3f3;border:1px solid #e51c23;border-radius:20px;font-size:12px;color:#e51c23;display:none;white-space:nowrap;}
.menu-tag.show{display:block;}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;}
.message{display:flex;gap:10px;max-width:88%;}
.message.user{flex-direction:row-reverse;align-self:flex-end;}
.message.bot{align-self:flex-start;}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;align-self:flex-end;}
.bot .avatar{background:#e51c23;}
.user .avatar{background:#1a1a2e;}
.bubble{padding:12px 16px;border-radius:18px;font-size:13.5px;line-height:1.75;}

.user .bubble{background:#e51c23;color:white;border-bottom-right-radius:4px;}

.bubble table th{background:#f5f5f5;padding:7px 10px;border:1px solid #ddd;text-align:left;font-weight:600;}
.bubble table td{padding:7px 10px;border:1px solid #ddd;}
.bubble table tr:nth-child(even) td{background:#fafafa;}
.source-tag{margin-top:10px;padding:6px 10px;background:#fff8e1;border-left:3px solid #ffc107;border-radius:4px;font-size:11px;color:#795548;}
.timestamp{font-size:10px;color:#bbb;margin-top:4px;}

    answer:"<b>📅 유선 개통(설치) 일정 조율 방법</b><br><br>아래 양식에 작성하여 <b>유선 담당마케터(한동철M)</b>에게 카톡 송부<br><br>■ 유선 개통 요청 양식<br>• 요청 대리점 / 담당자:<br>• 서비스관리번호:<br>• 주소:<br>• 청약일자:<br>• 요청사유:<br>• 개통 희망 요청일:<br>• 고객가능 스케줄 (일자, 시간대):",
    source:"마케터Q&A"
  }
];

// =============================================
// 상태 관리
// =============================================
var selectedLevel1 = null;
var activeMenuId = null;

// =============================================
// 메뉴 선택
// =============================================
function selectLevel1(name, menuId) {
  if (activeMenuId) { document.getElementById(activeMenuId).classList.remove('active'); }
  selectedLevel1 = name;
  activeMenuId = menuId;
  document.getElementById(menuId).classList.add('active');
  document.getElementById('allSearchBtn').classList.remove('active');
  document.getElementById('selectedBadgeText').textContent = '📁 ' + name;
  document.getElementById('selectedBadge').classList.add('show');
  document.getElementById('menuTag').textContent = '📁 ' + name;
  document.getElementById('menuTag').classList.add('show');
  updateQuickBtns(name);
  addBotMessage('<b>📁 "' + name + '"</b> 메뉴가 선택되었습니다.<br>해당 메뉴 내에서 우선 검색하여 답변드릴게요! 😊<br><br>질문을 입력하거나 아래 빠른 질문 버튼을 눌러보세요.', null);
}

function clearMenu() {
  selectedLevel1 = null;
  if (activeMenuId) { document.getElementById(activeMenuId).classList.remove('active'); activeMenuId = null; }
  document.getElementById('selectedBadge').classList.remove('show');
  document.getElementById('menuTag').classList.remove('show');
  document.getElementById('allSearchBtn').classList.add('active');
  resetQuickBtns();
  addBotMessage('메뉴 선택이 해제되었습니다. <b>전체 범위</b>에서 검색합니다. 🔍', null);
}

function updateQuickBtns(name) {
  var c = document.getElementById('quickBtns');
  var f = qaDB.filter(function(d){ return d.level1 === name; });
  c.innerHTML = f.slice(0,5).map(function(d){
    return '<span class="quick-btn" onclick="quickAsk(\'' + d.questions[0].replace(/'/g,"\\'") + '\')">' + d.questions[0] + '</span>';
  }).join('');
}

function resetQuickBtns() {
  document.getElementById('quickBtns').innerHTML =
    '<span class="quick-btn" onclick="quickAsk(\'IPTV 할인오퍼 종류가 어떤게 있나요\')">📺 IPTV 할인오퍼 종류</span>' +
    '<span class="quick-btn" onclick="quickAsk(\'AI4 셋톱 출시 관련 프로모션은 무엇인가요\')">🔵 AI4 셋톱 프로모션</span>' +
    '<span class="quick-btn" onclick="quickAsk(\'단기해지 기준은 어떻게 되나요\')">⚠️ 단기해지 기준</span>' +
    '<span class="quick-btn" onclick="quickAsk(\'초고속 재가입 패널티는 어떻게 되나요\')">🔄 재가입 패널티</span>' +
    '<span class="quick-btn" onclick="quickAsk(\'유선 경품 가이드는 어떻게 되나요\')">🎁 경품 가이드</span>' +
    '<span class="quick-btn" onclick="quickAsk(\'유선 비가용 주소로 확인 되는 경우 어떻게 해야 하나요\')">🔧 비가용 실사요청</span>';
}

// =============================================
// 검색 엔진
// =============================================
function searchAnswer(query) {
  var q = query.toLowerCase().replace(/\s/g,'');
  var pool = selectedLevel1 ? qaDB.filter(function(d){ return d.level1 === selectedLevel1; }) : qaDB;

  // 1단계: 정확 매칭
  for (var i=0; i<pool.length; i++) {
    for (var j=0; j<pool[i].questions.length; j++) {
      var nq = pool[i].questions[j].toLowerCase().replace(/\s/g,'');
      if (q.includes(nq) || nq.includes(q)) return {type:'exact', data:pool[i]};
    }
  }

  // 2단계: 키워드 매칭
  var bestMatch=null, bestScore=0;
  for (var i=0; i<pool.length; i++) {
    var score=0;
    for (var k=0; k<pool[i].keywords.length; k++) {
      var nk = pool[i].keywords[k].toLowerCase().replace(/\s/g,'');
      if (q.includes(nk) || nk.includes(q)) score+=3;
    }
    for (var j=0; j<pool[i].questions.length; j++) {
      var words = pool[i].questions[j].toLowerCase().split(/[\s;,]+/);
      for (var w=0; w<words.length; w++) {
        if (words[w].length>1 && q.includes(words[w])) score+=1;
      }
    }
    if (score>bestScore) { bestScore=score; bestMatch=pool[i]; }
  }
  if (bestScore>=2) return {type:'partial', data:bestMatch};

  // 3단계: 전체 재검색
  if (selectedLevel1) {
    for (var i=0; i<qaDB.length; i++) {
      for (var k=0; k<qaDB[i].keywords.length; k++) {
        if (q.includes(qaDB[i].keywords[k].toLowerCase().replace(/\s/g,''))) return {type:'partial', data:qaDB[i]};
      }
    }
  }
  return {type:'none', data:null};
}

// =============================================
// 메시지 출력
// =============================================
function getTime() { return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }

function addUserMessage(text) {
  var m = document.getElementById('messages');
  m.innerHTML += '<div class="message user"><span class="timestamp">'+getTime()+'</span><div class="bubble">'+text+'</div><div class="avatar">👤</div></div>';
  m.scrollTop = m.scrollHeight;
}

function addBotMessage(html, source) {
  var m = document.getElementById('messages');
  var sh = source ? '<div class="source-tag">📌 출처: '+source+'</div>' : '';
  m.innerHTML += '<div class="message bot"><div class="avatar">🤖</div><div><div class="bubble">'+html+sh+'</div><span class="timestamp">'+getTime()+'</span></div></div>';
  m.scrollTop = m.scrollHeight;
}

function showTyping() {
  var m = document.getElementById('messages');
  m.innerHTML += '<div class="message bot" id="typingDot"><div class="avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>';
  m.scrollTop = m.scrollHeight;
}

function removeTyping() { var t=document.getElementById('typingDot'); if(t) t.remove(); }

// =============================================
// 메시지 전송
// =============================================
function sendMessage() {
  var input = document.getElementById('userInput');
  var text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = '48px';
  addUserMessage(text);
  showTyping();
  setTimeout(function(){
    removeTyping();
    var result = searchAnswer(text);
    if (result.type === 'exact') {
      addBotMessage(result.data.answer, result.data.source);
    } else if (result.type === 'partial') {
      addBotMessage('🔍 관련 내용을 찾았습니다. 아래 내용이 맞나요?<br><br>'+result.data.answer+'<br><br>💬 더 구체적으로 질문해 주시면 정확한 답변을 드릴게요!', result.data.source);
    } else {
      addBotMessage('질문에 적합한 검색결과가 없어서 답변을 드릴 수 없습니다.<br><br>💡 다른 키워드로 다시 질문하거나, 왼쪽 메뉴에서 카테고리를 선택해 주세요.', null);
    }
  }, 700);
}

function quickAsk(q) { document.getElementById('userInput').value=q; sendMessage(); }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height='48px'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
